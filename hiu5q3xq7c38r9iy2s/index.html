<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel</title>
  <link rel="icon" href="data:," />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0f;
      --card:    #111118;
      --border:  #2a1a3e;
      --purple:  #8a2be2;
      --glow:    rgba(138,43,226,.5);
      --soft:    rgba(138,43,226,.15);
      --text:    #e0e0e0;
      --muted:   #888;
      --danger:  #c0392b;
      --green:   #27ae60;
      --font:    'Share Tech Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 { color: var(--purple); letter-spacing: 4px; font-size: 18px; margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: 11px; letter-spacing: 2px; margin-bottom: 32px; }

    /* ── Token setup ── */
    #setupScreen {
      max-width: 520px;
      margin: 80px auto;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 32px;
    }
    #setupScreen h2 { color: var(--purple); letter-spacing: 3px; font-size: 14px; margin-bottom: 16px; }
    #setupScreen p  { color: var(--muted); font-size: 12px; line-height: 1.8; margin-bottom: 20px; }
    #setupScreen a  { color: var(--purple); }

    /* ── Main panel ── */
    #panel { max-width: 900px; margin: 0 auto; display: none; }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; top: 20px; right: 20px;
      background: var(--purple); color: #fff;
      font-family: var(--font); font-size: 12px; letter-spacing: 1px;
      padding: 12px 20px; border: 1px solid var(--glow);
      box-shadow: 0 0 20px var(--glow);
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
      z-index: 999;
    }
    #toast.show { opacity: 1; }
    #toast.err  { background: var(--danger); border-color: rgba(192,57,43,.6); }

    /* ── Cards list ── */
    .app-row {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .app-row-name { flex: 1; min-width: 160px; font-size: 13px; }
    .app-row-tag  { color: var(--muted); font-size: 11px; letter-spacing: 1px; }
    .app-row-status {
      font-size: 10px; letter-spacing: 1px; padding: 3px 8px;
      border: 1px solid var(--border); color: var(--muted);
    }
    .app-row-status.released { border-color: var(--green); color: var(--green); }
    .app-row-status.soon     { border-color: var(--muted); }

    /* ── Form ── */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 28px;
      margin-top: 32px;
    }
    .form-card h2 { font-size: 13px; letter-spacing: 3px; color: var(--purple); margin-bottom: 20px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

    input, select, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 10px 12px;
      outline: none;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--purple);
      box-shadow: 0 0 8px var(--soft);
    }
    select option { background: var(--card); }
    textarea { resize: vertical; min-height: 70px; }

    /* ── Buttons ── */
    .btn {
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 20px;
      border: 1px solid var(--purple);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all .25s;
    }
    .btn:hover { background: var(--purple); box-shadow: 0 0 12px var(--glow); }
    .btn-primary { background: var(--purple); }
    .btn-danger  { border-color: var(--danger); }
    .btn-danger:hover { background: var(--danger); box-shadow: none; }
    .btn-sm { padding: 6px 12px; font-size: 10px; }
    .btn-ghost { border-color: var(--border); color: var(--muted); }
    .btn-ghost:hover { background: var(--border); box-shadow: none; }

    .form-actions { margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; }

    /* ── Settings ── */
    .settings-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 20px 28px;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .settings-card span { flex: 1; font-size: 12px; color: var(--muted); }

    .drag-hint { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-bottom: 8px; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
    }
  </style>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<!-- ── Setup screen (first visit) ── -->
<div id="setupScreen">
  <h2>// Panel Setup</h2>
  <p>
    This panel uses the GitHub API to update your apps list directly.<br><br>
    You need a <strong>GitHub Personal Access Token</strong> with <code>repo</code> scope.<br><br>
    <a href="https://github.com/settings/tokens/new?scopes=repo&description=f0rlorN-panel" target="_blank" rel="noopener">
      → Generate a token here
    </a>
  </p>

  <div class="form-group" style="margin-bottom:14px;">
    <label>GitHub Username</label>
    <input id="setupUser" type="text" placeholder="your-github-username" />
  </div>
  <div class="form-group" style="margin-bottom:14px;">
    <label>Repository Name</label>
    <input id="setupRepo" type="text" placeholder="f0rlorN-site" />
  </div>
  <div class="form-group" style="margin-bottom:20px;">
    <label>Personal Access Token</label>
    <input id="setupToken" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
  </div>

  <button class="btn btn-primary" onclick="saveSetup()">Save &amp; Connect</button>
</div>

<!-- ── Main Panel ── -->
<div id="panel">
  <div class="top-bar">
    <div>
      <h1>// f0rLorN Panel</h1>
      <div class="sub">apps manager — changes push directly to github</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-sm btn-ghost" onclick="loadApps()">Refresh</button>
      <button class="btn btn-sm btn-danger" onclick="clearSetup()">Disconnect</button>
    </div>
  </div>

  <!-- Current Apps -->
  <div class="drag-hint">Current apps — edit or delete any entry</div>
  <div id="appsList"></div>

  <!-- Add / Edit Form -->
  <div class="form-card" id="formCard">
    <h2 id="formTitle">// Add New App</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>App Name</label>
        <input id="fName" type="text" placeholder="Recorder" />
      </div>
      <div class="form-group">
        <label>Category Tag</label>
        <input id="fTag" type="text" placeholder="Screen Capture" />
      </div>
      <div class="form-group">
        <label>Icon</label>
        <select id="fIcon">
          <option value="audio">audio</option>
          <option value="cleaner">cleaner</option>
          <option value="blur">blur</option>
          <option value="video">video</option>
          <option value="network">network</option>
          <option value="code">code</option>
          <option value="game">game</option>
          <option value="system">system</option>
          <option value="tool">tool</option>
        </select>
      </div>
      <div class="form-group">
        <label>Badge Text</label>
        <input id="fBadge" type="text" placeholder="Free" value="Free" />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="fStatus">
          <option value="released">Released (shows download)</option>
          <option value="soon">Coming Soon (no download)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Download URL</label>
        <input id="fUrl" type="text" placeholder="https://github.com/YOU/repo/releases/latest" />
      </div>
      <div class="form-group full">
        <label>Description</label>
        <textarea id="fDesc" placeholder="Short description shown on the app card..."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="submitForm()">
        <span id="formBtnLabel">Add App</span>
      </button>
      <button class="btn btn-ghost" onclick="resetForm()" id="cancelBtn" style="display:none;">Cancel Edit</button>
    </div>
  </div>
</div>

<script>
// ── Config stored in localStorage ─────────────────────────────────
const LS = {
  get: k  => localStorage.getItem('f0panel_' + k),
  set: (k,v) => localStorage.setItem('f0panel_' + k, v),
  del: k  => localStorage.removeItem('f0panel_' + k),
};

let APPS = [];
let editIndex = null;
let currentSha = null;

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg, err = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (err ? ' err' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = '', 3000);
}

// ── Setup ─────────────────────────────────────────────────────────
function saveSetup() {
  const user  = document.getElementById('setupUser').value.trim();
  const repo  = document.getElementById('setupRepo').value.trim();
  const token = document.getElementById('setupToken').value.trim();
  if (!user || !repo || !token) return toast('Fill all fields', true);
  LS.set('user', user);
  LS.set('repo', repo);
  LS.set('token', token);
  initPanel();
}

function clearSetup() {
  if (!confirm('Disconnect? Your token will be removed from this browser.')) return;
  ['user','repo','token'].forEach(k => LS.del(k));
  location.reload();
}

// ── GitHub API helpers ────────────────────────────────────────────
function apiHeaders() {
  return {
    'Authorization': 'token ' + LS.get('token'),
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json',
  };
}
function apiUrl(path) {
  return `https://api.github.com/repos/${LS.get('user')}/${LS.get('repo')}${path}`;
}

async function loadApps() {
  toast('Loading...');
  try {
    const res = await fetch(apiUrl('/contents/apps.js'), { headers: apiHeaders() });
    if (!res.ok) throw new Error('Cannot read apps.js — check your token and repo name.');
    const data = await res.json();
    currentSha = data.sha;
    const code = atob(data.content.replace(/\n/g, ''));

    // Extract the APPS array from the JS file
    const match = code.match(/const APPS\s*=\s*(\[[\s\S]*?\]);/);
    if (!match) throw new Error('Could not parse APPS array in apps.js');
    APPS = JSON.parse(match[1]
      .replace(/\/\/.*$/gm, '')          // strip line comments
      .replace(/,(\s*[\]\}])/g, '$1')    // trailing commas
    );
    renderList();
    toast('Loaded ' + APPS.length + ' apps');
  } catch(e) {
    toast(e.message, true);
  }
}

async function saveApps() {
  toast('Saving...');
  const code = buildAppsJs();
  const encoded = btoa(unescape(encodeURIComponent(code)));
  try {
    const res = await fetch(apiUrl('/contents/apps.js'), {
      method: 'PUT',
      headers: apiHeaders(),
      body: JSON.stringify({
        message: 'panel: update apps list',
        content: encoded,
        sha: currentSha,
      }),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'Failed to save');
    }
    const data = await res.json();
    currentSha = data.content.sha;
    toast('Saved! GitHub is deploying...');
  } catch(e) {
    toast(e.message, true);
  }
}

// ── Build apps.js file content ────────────────────────────────────
function buildAppsJs() {
  const arr = APPS.map(app => {
    return `  {
    name: ${JSON.stringify(app.name)},
    tag: ${JSON.stringify(app.tag)},
    desc: ${JSON.stringify(app.desc)},
    downloadUrl: ${JSON.stringify(app.downloadUrl || '')},
    icon: ${JSON.stringify(app.icon)},
    badge: ${JSON.stringify(app.badge || 'Free')},
    status: ${JSON.stringify(app.status)},
  }`;
  }).join(',\n');

  return `// ============================================================
//  f0rLorN Apps Config — managed via panel
// ============================================================

const APPS = [
${arr},
];
`;
}

// ── Render app list ───────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('appsList');
  if (!APPS.length) {
    el.innerHTML = '<p style="color:var(--muted);font-size:12px;padding:16px 0;">No apps yet. Add one below.</p>';
    return;
  }
  el.innerHTML = APPS.map((app, i) => `
    <div class="app-row">
      <div class="app-row-name">
        f0rLorN <strong>${app.name}</strong>
        <div class="app-row-tag">${app.tag}</div>
      </div>
      <span class="app-row-status ${app.status}">${app.status}</span>
      <button class="btn btn-sm" onclick="editApp(${i})">Edit</button>
      <button class="btn btn-sm btn-danger" onclick="deleteApp(${i})">Delete</button>
    </div>
  `).join('');
}

// ── Form ──────────────────────────────────────────────────────────
function resetForm() {
  editIndex = null;
  document.getElementById('formTitle').textContent     = '// Add New App';
  document.getElementById('formBtnLabel').textContent  = 'Add App';
  document.getElementById('cancelBtn').style.display   = 'none';
  document.getElementById('fName').value   = '';
  document.getElementById('fTag').value    = '';
  document.getElementById('fDesc').value   = '';
  document.getElementById('fUrl').value    = '';
  document.getElementById('fIcon').value   = 'audio';
  document.getElementById('fBadge').value  = 'Free';
  document.getElementById('fStatus').value = 'released';
}

function editApp(i) {
  const app = APPS[i];
  editIndex = i;
  document.getElementById('formTitle').textContent     = '// Edit App';
  document.getElementById('formBtnLabel').textContent  = 'Save Changes';
  document.getElementById('cancelBtn').style.display   = 'inline-flex';
  document.getElementById('fName').value   = app.name;
  document.getElementById('fTag').value    = app.tag;
  document.getElementById('fDesc').value   = app.desc;
  document.getElementById('fUrl').value    = app.downloadUrl || '';
  document.getElementById('fIcon').value   = app.icon;
  document.getElementById('fBadge').value  = app.badge || 'Free';
  document.getElementById('fStatus').value = app.status;
  document.getElementById('formCard').scrollIntoView({ behavior: 'smooth' });
}

function deleteApp(i) {
  if (!confirm(`Delete "${APPS[i].name}"?`)) return;
  APPS.splice(i, 1);
  renderList();
  saveApps();
}

async function submitForm() {
  const app = {
    name:        document.getElementById('fName').value.trim(),
    tag:         document.getElementById('fTag').value.trim(),
    desc:        document.getElementById('fDesc').value.trim(),
    downloadUrl: document.getElementById('fUrl').value.trim(),
    icon:        document.getElementById('fIcon').value,
    badge:       document.getElementById('fBadge').value.trim() || 'Free',
    status:      document.getElementById('fStatus').value,
  };
  if (!app.name || !app.tag || !app.desc) return toast('Name, tag, and description are required', true);

  if (editIndex !== null) {
    APPS[editIndex] = app;
  } else {
    APPS.push(app);
  }

  renderList();
  resetForm();
  await saveApps();
}

// ── Init ──────────────────────────────────────────────────────────
function initPanel() {
  if (!LS.get('token') || !LS.get('user') || !LS.get('repo')) {
    document.getElementById('setupScreen').style.display = 'block';
    document.getElementById('panel').style.display       = 'none';
    return;
  }
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('panel').style.display       = 'block';
  loadApps();
}

initPanel();
</script>
</body>
</html>
